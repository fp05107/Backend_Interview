events { worker_connections 1024; }

http {
    upstream node_app {
        least_conn;
        server api-1:3000;
        server api-2:3000;
        server api-3:3000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://node_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}