version: '3.8'

services:
  # --- MongoDB Replica Set ---
  mongo-primary:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo-primary:27017'},{_id:1,host:'mongo-secondary-1:27017'},{_id:2,host:'mongo-secondary-2:27017'}]}) }" | mongosh --quiet
      interval: 10s
      start_period: 10s

  mongo-secondary-1:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all"]

  mongo-secondary-2:
    image: mongo:6.0
    command: ["--replSet", "rs0", "--bind_ip_all"]

  # --- 3 Express Servers ---
  api-1:
    build: ./app
    environment: &api-env
      MONGO_URI: mongodb://mongo-primary:27017,mongo-secondary-1:27017,mongo-secondary-2:27017/mydb?replicaSet=rs0&readPreference=secondaryPreferred
      PORT: 3000
    depends_on:
      - mongo-primary

  api-2:
    build: ./app
    environment: *api-env
    depends_on:
      - mongo-primary

  api-3:
    build: ./app
    environment: *api-env
    depends_on:
      - mongo-primary

  # --- NGINX Load Balancer ---
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3