networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mongo-primary-data:
  mongo-secondary1-data:
  mongo-secondary2-data:

services:

  # ─── MongoDB Primary (Write Database) ──────────────────────────────────────
  mongo-primary:
    image: mongo:7.0
    container_name: mongo-primary
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --wiredTigerCacheSizeGB 1
    volumes:
      - mongo-primary-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MongoDB Secondary 1 (Read Replica) ─────────────────────────────────────
  mongo-secondary1:
    ports:
      - "27018:27017" 
    image: mongo:7.0
    container_name: mongo-secondary1
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --wiredTigerCacheSizeGB 1
    volumes:
      - mongo-secondary1-data:/data/db
    networks:
      - app-network
    depends_on:
      mongo-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── MongoDB Secondary 2 (Read Replica) ─────────────────────────────────────
  mongo-secondary2:
    ports:
      - "27019:27017" 
    image: mongo:7.0
    container_name: mongo-secondary2
    restart: unless-stopped
    command: mongod --replSet rs0 --bind_ip_all --wiredTigerCacheSizeGB 1
    volumes:
      - mongo-secondary2-data:/data/db
    networks:
      - app-network
    depends_on:
      mongo-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Replica Set Initializer (runs once then exits) ─────────────────────────
  mongo-init:
    image: mongo:7.0
    container_name: mongo-init
    restart: "no"
    depends_on:
      mongo-primary:
        condition: service_healthy
      mongo-secondary1:
        condition: service_healthy
      mongo-secondary2:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host mongo-primary:27017 /docker-entrypoint-initdb.d/init.js
      "
    volumes:
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro

  # ─── Express Write Server (Server 1) ─────────────────────────────────────────
  server1:
    build: ./server1
    container_name: express-server1
    restart: unless-stopped
    environment:
      PORT: 3000
      SERVER_ID: server1-write
      NODE_ENV: production
      MONGO_URI: "mongodb://mongo-primary:27017,mongo-secondary1:27017,mongo-secondary2:27017/appdb?replicaSet=rs0"
    networks:
      - app-network
    depends_on:
      - mongo-init
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── Express Read Server 2 ───────────────────────────────────────────────────
  server2:
    build: ./server2
    container_name: express-server2
    restart: unless-stopped
    environment:
      PORT: 3000
      SERVER_ID: server2-read
      NODE_ENV: production
      MONGO_URI: "mongodb://mongo-primary:27017,mongo-secondary1:27017,mongo-secondary2:27017/appdb?replicaSet=rs0&readPreference=secondaryPreferred"
    networks:
      - app-network
    depends_on:
      - mongo-init
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── Express Read Server 3 ───────────────────────────────────────────────────
  server3:
    build: ./server3
    container_name: express-server3
    restart: unless-stopped
    environment:
      PORT: 3000
      SERVER_ID: server3-read
      NODE_ENV: production
      MONGO_URI: "mongodb://mongo-primary:27017,mongo-secondary1:27017,mongo-secondary2:27017/appdb?replicaSet=rs0&readPreference=secondaryPreferred"
    networks:
      - app-network
    depends_on:
      - mongo-init
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  # ─── NGINX Load Balancer ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - server1
      - server2
      - server3
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3