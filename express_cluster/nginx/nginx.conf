# Number of worker processes (set to number of CPU cores, or auto)
worker_processes auto;

# Maximum number of simultaneous connections per worker
events {
    worker_connections 4096;
    use epoll;            # Linux-specific, most efficient I/O method
    multi_accept on;      # Accept multiple connections at once
}

http {
    # ─── Basic Settings ───────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;          # Send headers and file start in one packet
    tcp_nodelay on;         # Don't buffer small packets
    keepalive_timeout 65;   # Keep connections alive for 65 seconds
    types_hash_max_size 2048;
    server_tokens off;      # Hide NGINX version for security

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'upstream_rt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ─── Gzip Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss;

    # ─── Rate Limiting ────────────────────────────────────────────────────────
    # Allow 10 requests/second per IP, burst up to 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ─── Upstream Servers ─────────────────────────────────────────────────────
    # Write server (only server1 handles writes)
    upstream write_servers {
        server server1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;  # Keep 32 connections alive to this server
    }

    # Read servers (server2 and server3 handle reads)
    # least_conn = send request to server with fewest active connections
    upstream read_servers {
        least_conn;
        server server2:3000 max_fails=3 fail_timeout=30s weight=1;
        server server3:3000 max_fails=3 fail_timeout=30s weight=1;
        keepalive 64;  # More keepalive connections for read servers
    }

    # ─── HTTP Server (redirects to HTTPS in production) ───────────────────────
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;

        # In production with SSL, uncomment this and comment out the location block:
        # return 301 https://$host$request_uri;

        # For local development without SSL:
        location / {
            return 200 'NGINX Load Balancer is running!';
            add_header Content-Type text/plain;
        }

        # Health check endpoint for NGINX itself
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Route POST, PUT, DELETE → Write Server (server1)
        location ~ ^/api/(users)$ {
            limit_except GET HEAD {
                # Only POST, PUT, DELETE go to write server
                proxy_pass http://write_servers;
            }

            # GET requests go to read servers
            proxy_pass http://read_servers;

            # Proxy headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 10;
        }

        # Write-only routes (POST/PUT/DELETE only)
        location ~ ^/api/users/[^/]+$ {
            proxy_pass http://write_servers;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            limit_req zone=api_limit burst=10 nodelay;
        }

        # Search route → Read servers only
        location /api/search {
            proxy_pass http://read_servers;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            limit_req zone=api_limit burst=30 nodelay;
        }

        # Health checks bypass rate limiting
        location /health {
            proxy_pass http://read_servers;
            access_log off;  # Don't log health check spam
        }
    }

    # ─── HTTPS Server (Production) ────────────────────────────────────────────
    # Uncomment this entire block after you get SSL certificates with certbot
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com www.yourdomain.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS: Tell browsers to always use HTTPS
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header X-Frame-Options DENY;
    #     add_header X-Content-Type-Options nosniff;
    #
    #     # Same location blocks as HTTP server above
    # }
}